# ─────────────────────────────────────────────────────────────────────────────
# Mekseb — CI/CD Pipeline
# Deploys to BOTH GitHub Pages AND AWS S3 on every push to main
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Mekseb

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  S3_BUCKET: mekseb-staging

jobs:
  # ───────────────────────────────────────
  # JOB 1: Build
  # ───────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-out
          path: out/
          retention-days: 1

  # ───────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages
  # ───────────────────────────────────────
  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-out
          path: out/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages

  # ───────────────────────────────────────
  # JOB 3: Deploy to AWS S3
  # ───────────────────────────────────────
  deploy-s3:
    name: Deploy to AWS S3
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-out
          path: out/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Static assets — long cache
          aws s3 sync out/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

          # HTML + JSON — no cache so updates show immediately
          aws s3 sync out/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html" \
            --include "*.json"

      - name: Print S3 URL
        run: |
          echo "✅ S3 URL: http://${{ env.S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"

  # ───────────────────────────────────────
  # JOB 4: Summary
  # ───────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-github-pages, deploy-s3]

    steps:
      - name: Print summary
        run: |
          echo "🚀 Deployed successfully!"
          echo ""
          echo "🐙 GitHub Pages: https://fikretekie.github.io/meksebstaging"
          echo "☁️  AWS S3:       http://${{ env.S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
          echo ""
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 By: ${{ github.actor }}"